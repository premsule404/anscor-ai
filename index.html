<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        ANSCOR-AI Login
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body class="split">

    <!-- LEFT SIDE -->

    <div class="left">

        <h1>ANSCOR-AI</h1>

        <p>
            AI-Based Non-Invasive
            Anemia Detection System
        </p>

    </div>


    <!-- RIGHT SIDE -->

    <div class="right">

        <div class="form-container">

            <h2>Sign In</h2>

            <!-- EMAIL -->

            <input
                id="email"
                type="email"
                placeholder="Email"
            >

            <!-- PASSWORD -->

            <input
                id="password"
                type="password"
                placeholder="Password"
            >

            <!-- LOGIN BUTTON -->

            <button onclick="login()">

                Sign In

            </button>

            <!-- SIGNUP LINK -->

            <p class="bottom-text">

                Don't have an account?

                <a href="signup.html">

                    Create One

                </a>

            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
