<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="split">

<div class="left">
    <h1>ANSCOR-AI</h1>
</div>

<div class="right">
    <h2>Create Account</h2>

    <input id="name" placeholder="Full Name"><br>
    <input id="email" placeholder="Email"><br>
    <input id="phone" placeholder="Phone"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <input id="sex" placeholder="Sex"><br>
    <input id="dob" type="date"><br>
    <input id="age" placeholder="Age"><br>
    <input id="blood" placeholder="Blood Group"><br>
    <input id="country" placeholder="Country"><br>

    <button onclick="signup()">Register</button>
</div>

<script src="script.js"></script>
</body>
</html>
