<!DOCTYPE html>
<html>
<head>
<title>Check Anemia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="text-align:center;">Anemia Check</h1>

<!-- 🔹 PART 1: IMAGE UPLOAD -->
<div class="section">
    <h2>Select Image Source</h2>

    <div class="upload-box">
        <label>
            <input id="fileInput" type="file" accept="image/*" capture="camera">
            📸 Camera
        </label>

        <label>
            <input type="file" accept="image/*">
            🖼 Photos
        </label>

        <label>
            <input type="file">
            📂 Files
        </label>
    </div>

    <button onclick="upload()">Upload</button>
</div>

<!-- 🔹 PART 2: SYMPTOMS SURVEY -->
<div class="section">
    <h2>Check Symptoms</h2>

<div class="symptom-row">
    <label>Feeling faint</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Malaise</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Dizziness</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Shortness of breath</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Lightheadedness</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Pallor</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Cold feet</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Extreme fatigue</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Pale skin</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Tiredness</label>
    <input type="checkbox">
</div>

<div class="symptom-row">
    <label>Fatigue after eating</label>
    <input type="checkbox">
</div>

   <button onclick="submitSymptoms()">Submit Symptoms</button>
</div>
