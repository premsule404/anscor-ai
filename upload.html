<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Check Anemia</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body class="upload-page">

    <!-- NAVBAR -->

    <div class="navbar">

        <h2>ANSCOR-AI</h2>

        <button onclick="goProfile()">

            Profile

        </button>

    </div>


    <!-- PAGE TITLE -->

    <div class="page-title">

        <h1>AI-Based Anemia Screening</h1>

        <p>
            Upload a nail image and
            complete symptom survey
        </p>

    </div>


    <!-- IMAGE SECTION -->

    <div class="section">

        <h2>Select Image Source</h2>

        <div class="upload-box">

            <!-- MAIN INPUT -->

            <input
                id="fileInput"
                type="file"
                accept="image/*"
                hidden
            >

            <!-- CAMERA -->

            <label
                for="fileInput"
                class="upload-option"
            >

                📷 Camera

            </label>

            <!-- PHOTOS -->

            <label
                for="fileInput"
                class="upload-option"
            >

                🖼 Photos

            </label>

            <!-- FILES -->

            <label
                for="fileInput"
                class="upload-option"
            >

                📁 Files

            </label>

        </div>

        <!-- PREVIEW -->

        <div class="preview-container">

            <img
                id="previewImage"
                style="
                    display:none;
                    width:220px;
                    height:220px;
                    object-fit:cover;
                    border-radius:15px;
                    margin-top:20px;
                "
            >

        </div>

    </div>


    <!-- SYMPTOM SECTION -->

    <div class="section">

        <h2>Check Symptoms</h2>

        <div class="symptom-row">
            <label>Feeling faint</label>
            <input type="checkbox" value="Feeling faint">
        </div>

        <div class="symptom-row">
            <label>Malaise</label>
            <input type="checkbox" value="Malaise">
        </div>

        <div class="symptom-row">
            <label>Dizziness</label>
            <input type="checkbox" value="Dizziness">
        </div>

        <div class="symptom-row">
            <label>Shortness of breath</label>
            <input type="checkbox" value="Shortness of breath">
        </div>

        <div class="symptom-row">
            <label>Lightheadedness</label>
            <input type="checkbox" value="Lightheadedness">
        </div>

        <div class="symptom-row">
            <label>Pallor</label>
            <input type="checkbox" value="Pallor">
        </div>

        <div class="symptom-row">
            <label>Cold feet</label>
            <input type="checkbox" value="Cold feet">
        </div>

        <div class="symptom-row">
            <label>Extreme fatigue</label>
            <input type="checkbox" value="Extreme fatigue">
        </div>

        <div class="symptom-row">
            <label>Pale skin</label>
            <input type="checkbox" value="Pale skin">
        </div>

        <div class="symptom-row">
            <label>Tiredness</label>
            <input type="checkbox" value="Tiredness">
        </div>

        <div class="symptom-row">
            <label>Fatigue after eating</label>
            <input type="checkbox" value="Fatigue after eating">
        </div>


        <!-- BUTTONS -->

        <div class="button-group">

            <button
                id="analyzeBtn"
                onclick="validateSurvey()"
            >

                Analyze Image

            </button>

            <button
                id="submitBtn"
                onclick="submitSymptoms()"
            >

                Submit Symptoms

            </button>

        </div>

    </div>


    <!-- IMAGE PREVIEW SCRIPT -->

    <script>

        const fileInput =
            document.getElementById(
                "fileInput"
            );

        const previewImage =
            document.getElementById(
                "previewImage"
            );

        fileInput.addEventListener(
            "change",
            function () {

                const file =
                    this.files[0];

                if (file) {

                    previewImage.src =
                        URL.createObjectURL(file);

                    previewImage.style.display =
                        "block";
                }
            }
        );

    </script>

    <script src="script.js"></script>

</body>

</html>
